<!DOCTYPE html>
<html lang="ru" class="h-full bg-neutral-950 text-neutral-200">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Магазин{% endblock %}</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Настройка цветовой палитры -->
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    accentGreen: '#29ff8f',
                    accentPurple: '#9b4dff',
                    accentBlue: '#4dbdff',
                    accentYellow: '#ffd744',
                }
            }
        }
    }
    </script>

</head>

<body class="min-h-full flex flex-col">

<!-- TOP NAV -->
<header class="border-b border-neutral-800 bg-neutral-900/80 backdrop-blur-lg">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">

        <!-- Logo -->
        <a href="/" class="text-xl font-bold text-accentGreen tracking-wide hover:text-accentYellow transition">
            TechMarket
        </a>

        <!-- Categories -->
        <nav class="hidden md:flex gap-6 text-neutral-300">
            {% for cat in categories %}
            <a href="{% url 'product_list' cat.id %}" class="hover:text-accentBlue transition">
                {{ cat.name }}
            </a>
            {% endfor %}
        </nav>

        <!-- SEARCH -->
        <form method="GET" action="{% url 'index' %}" class="hidden md:block">
            <input name="q"
                   placeholder="Поиск..."
                   class="px-3 py-1.5 w-52 rounded bg-neutral-800 border border-neutral-700 focus:border-accentPurple outline-none transition">
        </form>

        <!-- RIGHT BUTTONS -->
        <div class="flex gap-3 items-center">
            <a href="{% url 'cart_detail' %}" class="relative p-2 text-neutral-300 hover:text-accentGreen transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                <span class="absolute -top-1 -right-1 bg-accentPurple text-black text-[10px] font-bold px-1.5 rounded-full">
                    {{ cart|length }}
                </span>
            </a>
            <a href="{% url 'login' %}"
               class="px-3 py-1.5 rounded bg-accentPurple hover:bg-accentGreen text-black transition">Войти</a>

            <a href="{% url 'register' %}"
               class="px-3 py-1.5 rounded border border-neutral-600 hover:border-accentBlue transition">Гость</a>

            <a href="/admin/"
               class="px-3 py-1.5 rounded bg-neutral-800 border border-neutral-700 hover:border-accentYellow transition">
                Админ
            </a>
        </div>
    </div>
</header>

<!-- MAIN -->
<main class="flex-1">
    {% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<footer class="mt-12 py-8 border-t border-neutral-800 text-center text-neutral-500">
    TechMarket © 2026
</footer>

</body>
</html>
