{% extends "base.html" %}
{% block title %}Категории{% endblock %}

{% block content %}
<section class="max-w-6xl mx-auto px-4 mt-10">
    <h1 class="text-3xl font-bold mb-8">Категории</h1>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
        {% for cat in categories %}
        <a href="{% url 'product_list' cat.id %}"
           class="p-6 rounded-xl bg-neutral-900 border border-neutral-800 hover:border-accentPurple transition shadow-lg">

            <h3 class="text-xl text-accentGreen font-bold">{{ cat.name }}</h3>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
